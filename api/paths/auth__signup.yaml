post:
  tags: ["auth"]
  operationId: authSignup
  summary: "新規テナント作成 + 管理者ユーザー登録"
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "#/components/schemas/AuthSignupRequest"
  responses:
    "201":
      description: テナントおよび管理者ユーザーの作成に成功
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AuthSignupResponse"
    default:
      description: Error Response
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AuthSignupRequest:
      type: object
      required:
        - tenant_name
        - user_name
        - email
        - password
        - password_confirmation
      properties:
        tenant_name:
          type: string
          description: "家族の名前"
          minLength: 1
          maxLength: 50
          example: "田中家"
        user_name:
          type: string
          description: "ユーザーの名前"
          minLength: 1
          maxLength: 25
          example: "太郎"
        email:
          type: string
          format: email
          description: "ログインメールアドレス"
          example: "taro@example.com"
        password:
          type: string
          description: "ログインパスワード（8文字以上・英数混合）"
          minLength: 8
          example: "Password123"
        password_confirmation:
          type: string
          description: "パスワード（確認用）"
          minLength: 8
          example: "Password123"

    AuthSignupResponse:
      type: object
      required:
        - user
        - tenant
        - token
      properties:
        user:
          $ref: "#/components/schemas/UserData"
        tenant:
          $ref: "#/components/schemas/TenantData"
        token:
          type: string
          description: "JWT アクセストークン"
          example: "eyJhbGciOiJIUzI1NiJ9..."

    UserData:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          readOnly: true
          example: 1
        name:
          type: string
          example: "太郎"
        email:
          type: string
          format: email
          example: "taro@example.com"

    TenantData:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "田中家"

    ErrorResponse:
      type: object
      required:
        - errors
      properties:
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: ["has already been taken"]
