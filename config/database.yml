# Use PostgreSQL. Connection settings are stored in Rails credentials.
# Run `bin/rails credentials:edit` to update.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= Rails.application.credentials.dig(:db, :host) %>
  username: <%= Rails.application.credentials.dig(:db, :username) %>
  password: <%= Rails.application.credentials.dig(:db, :password) %>

development:
  <<: *default
  database: <%= Rails.application.credentials.dig(:db, :database_development) %>

test:
  <<: *default
  database: <%= Rails.application.credentials.dig(:db, :database_test) %>

production:
  <<: *default
  database: <%= Rails.application.credentials.dig(:db, :database_production) %>
